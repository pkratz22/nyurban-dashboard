name: Scrape & Deploy

on:
  schedule:
    - cron: "0 6 * * *"   # runs daily at 6am UTC (2am ET)
  workflow_dispatch:        # also lets you trigger it manually from GitHub

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          NYURBAN_USERNAME: ${{ secrets.NYURBAN_USERNAME }}
          NYURBAN_PASSWORD: ${{ secrets.NYURBAN_PASSWORD }}
        run: python scraper/scraper.py

      - name: Deploy to GitHub Pages
        run: |
          cd web
          rm -f .gitignore
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Deploy"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/pkratz22/nyurban-dashboard.git" HEAD:gh-pages
